{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/styles.css'%}">

    <title>Document</title>
</head>
<body>
    <header class="mt-2">
        <h1 class="text-center">Control de Articulos</h1>
        <nav class="navbar navbar-expand-lg bg-info-subtle">
            <div class="container">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0 justify-content-center container">
                        <li class="nav-item me-5">
                            <a class="nav-link color-texto-menu" aria-current="page" href="/">Home</a>
                        </li>
                        <li class="nav-item me-5 ms-5">
                            <a class="nav-link color-texto-menu" aria-current="page" href="/articulos">Articulos</a>
                        </li>
                        <li class="nav-item ms-5">
                            <a class="nav-link color-texto-menu" href="/categorias">Categorias</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <hr>
    

    {% block contenido%}
    {% endblock %}

    <!---- Bootstrap ---->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <!---- Fonstawesome ---->
    <script src="https://kit.fontawesome.com/0a0e6258a4.js" crossorigin="anonymous"></script>
    <!---- Sweetaler2 ---->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!---- Js Personales ---->
    <script src="{% static 'js/utils.js'%}"></script>
    {% if messages %}
        {% for m in messages %}
            <script>
                Swal.fire({
                    title: "{{m}}",
                    text: "",
                    icon: "success"
                });
            </script>
        {% endfor %}
    {% endif %}
</body>
</html>
